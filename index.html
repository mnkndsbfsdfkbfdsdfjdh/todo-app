<!DOCTYPE html>
<html>
<head>
  <title>My To-Do App</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    li {
      list-style: none;
      margin: 10px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      width: 300px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<h1>🔥 My To-Do List</h1>

<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    let li = document.createElement("li");
    li.innerHTML = task + " <button onclick='this.parentElement.remove()'>❌</button>";

    document.getElementById("list").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
